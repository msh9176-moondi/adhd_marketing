    <style>
      :root {
        --primary: #2a7b9b;
        --primary-dark: #1e6a87;
        --accent: #4fd1c5;
        --dark: #0f0f1a;
        --dark-light: #1a1a2e;
        --text: #ffffff;
        --text-muted: rgba(255,255,255,0.7);
        --text-subtle: rgba(255,255,255,0.5);
        --success: #4ade80;
        --warning: #fb923c;
        --danger: #f87171;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
        line-height: 1.7;
        color: var(--text);
        background: var(--dark);
        min-height: 100vh;
      }

      .survey-container {
        max-width: 640px;
        margin: 0 auto;
        padding: 20px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ===== 진행률 바 ===== */
      .progress-bar-container {
        background: rgba(255,255,255,0.1);
        border-radius: 10px;
        height: 8px;
        margin-bottom: 24px;
        overflow: hidden;
      }

      .progress-bar {
        background: linear-gradient(90deg, var(--accent), var(--primary));
        height: 100%;
        border-radius: 10px;
        transition: width 0.4s ease;
      }

      .progress-text {
        text-align: center;
        font-size: 13px;
        color: var(--text-subtle);
        margin-bottom: 16px;
      }

      /* ===== 뒤로가기 버튼 ===== */
      .back-button {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: none;
        border: none;
        color: var(--text-subtle);
        font-size: 14px;
        cursor: pointer;
        padding: 8px 0;
        margin-bottom: 16px;
        transition: color 0.2s;
        font-family: inherit;
      }

      .back-button:hover {
        color: var(--accent);
      }

      /* ===== 카드 ===== */
      .card {
        background: var(--dark-light);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 20px;
        padding: 36px 28px;
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      /* ===== 시작 페이지 ===== */
      .start-page {
        text-align: center;
        justify-content: center;
      }

      .start-page h1 {
        font-size: 28px;
        font-weight: 900;
        margin-bottom: 20px;
        word-break: keep-all;
      }

      .start-page .description {
        font-size: 15px;
        color: var(--text-muted);
        line-height: 1.9;
        margin-bottom: 28px;
        word-break: keep-all;
      }

      .start-badge {
        display: inline-block;
        background: rgba(79,209,197,0.15);
        border: 1px solid rgba(79,209,197,0.3);
        color: var(--accent);
        font-size: 13px;
        font-weight: 600;
        padding: 8px 18px;
        border-radius: 20px;
        margin-bottom: 24px;
      }

      .info-box {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 16px;
        padding: 24px;
        margin-bottom: 28px;
        text-align: left;
      }

      .info-box h3 {
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .info-box ul {
        list-style: none;
        font-size: 14px;
        color: var(--text-muted);
      }

      .info-box li {
        padding: 6px 0;
        padding-left: 24px;
        position: relative;
      }

      .info-box li::before {
        content: '>';
        position: absolute;
        left: 0;
        color: var(--accent);
      }

      /* ===== 질문 페이지 ===== */
      .question-page h2 {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 12px;
        word-break: keep-all;
        line-height: 1.6;
      }

      .question-number {
        display: inline-block;
        background: var(--accent);
        color: var(--dark);
        font-size: 12px;
        font-weight: 700;
        padding: 5px 12px;
        border-radius: 12px;
        margin-bottom: 16px;
      }

      .question-hint {
        font-size: 14px;
        color: var(--text-subtle);
        margin-bottom: 28px;
      }

      /* ===== 체크박스 옵션 ===== */
      .options-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 28px;
      }

      .checkbox-option {
        display: flex;
        align-items: flex-start;
        gap: 14px;
        background: rgba(255,255,255,0.03);
        border: 2px solid rgba(255,255,255,0.1);
        border-radius: 14px;
        padding: 16px 18px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .checkbox-option:hover {
        border-color: var(--accent);
        background: rgba(79,209,197,0.1);
      }

      .checkbox-option.checked {
        border-color: var(--accent);
        background: rgba(79,209,197,0.15);
      }

      .checkbox-box {
        width: 24px;
        height: 24px;
        border: 2px solid rgba(255,255,255,0.3);
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: all 0.2s;
        font-size: 14px;
        color: var(--dark);
        font-weight: 700;
      }

      .checkbox-option.checked .checkbox-box {
        background: var(--accent);
        border-color: var(--accent);
      }

      .checkbox-label {
        font-size: 15px;
        color: var(--text-muted);
        word-break: keep-all;
        line-height: 1.5;
        flex: 1;
      }

      .checkbox-option.checked .checkbox-label {
        color: var(--accent);
        font-weight: 500;
      }

      /* ===== 버튼 ===== */
      .primary-btn {
        width: 100%;
        padding: 18px 24px;
        font-size: 17px;
        font-weight: 700;
        color: var(--dark);
        background: var(--accent);
        border: none;
        border-radius: 14px;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: auto;
        font-family: inherit;
        text-decoration: none;
        display: block;
        text-align: center;
        box-shadow: 0 8px 24px rgba(79,209,197,0.3);
      }

      .primary-btn:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 12px 32px rgba(79,209,197,0.4);
      }

      .primary-btn:disabled {
        background: rgba(255,255,255,0.1);
        color: var(--text-subtle);
        cursor: not-allowed;
        box-shadow: none;
      }

      .secondary-btn {
        width: 100%;
        padding: 16px 20px;
        font-size: 15px;
        font-weight: 600;
        color: var(--accent);
        background: rgba(79,209,197,0.1);
        border: 1px solid rgba(79,209,197,0.3);
        border-radius: 14px;
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
        text-align: center;
        display: block;
        font-family: inherit;
      }

      .secondary-btn:hover {
        background: var(--accent);
        color: var(--dark);
      }

      /* ===== 분석 중 페이지 ===== */
      .analyzing-page {
        text-align: center;
        justify-content: center;
        align-items: center;
      }

      .analyzing-spinner {
        width: 64px;
        height: 64px;
        border: 4px solid rgba(255,255,255,0.1);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 28px;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .analyzing-page h2 {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 16px;
      }

      .analyzing-page p {
        font-size: 15px;
        color: var(--text-muted);
        line-height: 1.9;
      }

      /* ===== 결과 페이지 ===== */
      .result-page {
        padding-bottom: 40px;
      }

      .result-page h1 {
        font-size: 24px;
        font-weight: 900;
        margin-bottom: 8px;
        text-align: center;
      }

      .result-subtitle {
        text-align: center;
        font-size: 15px;
        color: var(--text-muted);
        margin-bottom: 32px;
      }

      /* ===== 레이더 차트 ===== */
      .radar-container {
        position: relative;
        width: 100%;
        max-width: 320px;
        margin: 0 auto 32px;
      }

      .radar-chart {
        width: 100%;
        height: auto;
      }

      .radar-labels {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        pointer-events: none;
      }

      .radar-label {
        position: absolute;
        font-size: 12px;
        font-weight: 600;
        color: var(--text);
        text-align: center;
        transform: translate(-50%, -50%);
        white-space: nowrap;
      }

      .radar-label .percent {
        display: block;
        font-size: 14px;
        font-weight: 700;
        color: var(--accent);
        margin-top: 2px;
      }

      /* ===== 점수 바 ===== */
      .score-bars {
        display: flex;
        flex-direction: column;
        gap: 16px;
        margin-bottom: 32px;
      }

      .score-item {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .score-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .score-name {
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
      }

      .score-value {
        font-size: 14px;
        font-weight: 700;
        color: var(--accent);
      }

      .score-bar-bg {
        height: 8px;
        background: rgba(255,255,255,0.1);
        border-radius: 4px;
        overflow: hidden;
      }

      .score-bar-fill {
        height: 100%;
        border-radius: 4px;
        transition: width 1s ease;
      }

      .score-bar-fill.starter { background: #f87171; }
      .score-bar-fill.attention { background: #fb923c; }
      .score-bar-fill.emotional { background: #facc15; }
      .score-bar-fill.impulsive { background: #4ade80; }
      .score-bar-fill.environment { background: #60a5fa; }
      .score-bar-fill.complex { background: #c084fc; }

      /* ===== 주요 유형 카드 ===== */
      .primary-type-card {
        background: linear-gradient(135deg, rgba(79,209,197,0.2) 0%, rgba(42,123,155,0.2) 100%);
        border: 2px solid var(--accent);
        border-radius: 20px;
        padding: 28px;
        margin-bottom: 28px;
        text-align: center;
      }

      .primary-type-badge {
        display: inline-block;
        background: var(--accent);
        color: var(--dark);
        font-size: 12px;
        font-weight: 700;
        padding: 6px 16px;
        border-radius: 20px;
        margin-bottom: 16px;
      }

      .primary-type-card h2 {
        font-size: 22px;
        font-weight: 900;
        margin-bottom: 12px;
      }

      .primary-type-card p {
        font-size: 15px;
        color: var(--text-muted);
        line-height: 1.8;
      }

      /* ===== 분석 섹션 ===== */
      .analysis-section {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 16px;
        padding: 24px;
        margin-bottom: 24px;
      }

      .analysis-section h3 {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .analysis-section h3::before {
        content: '';
        width: 4px;
        height: 20px;
        background: var(--accent);
        border-radius: 2px;
      }

      .analysis-section p {
        font-size: 15px;
        color: var(--text-muted);
        line-height: 1.8;
      }

      .analysis-section ul {
        list-style: none;
        margin-top: 12px;
      }

      .analysis-section li {
        padding: 8px 0;
        padding-left: 24px;
        position: relative;
        font-size: 14px;
        color: var(--text-muted);
      }

      .analysis-section li::before {
        content: '>';
        position: absolute;
        left: 8px;
        color: var(--accent);
        font-weight: 700;
      }

      /* ===== 이메일 폼 ===== */
      .email-form-section {
        background: rgba(79,209,197,0.1);
        border: 1px solid rgba(79,209,197,0.3);
        border-radius: 16px;
        padding: 28px;
        margin-bottom: 24px;
      }

      .email-form-section input::placeholder {
        color: rgba(255,255,255,0.4);
      }

      /* ===== CTA 그룹 ===== */
      .cta-group {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 32px;
      }

      .kakao-btn {
        width: 100%;
        padding: 18px 24px;
        font-size: 17px;
        font-weight: 700;
        color: #1a1a1a;
        background: #fee500;
        border: none;
        border-radius: 14px;
        cursor: pointer;
        transition: all 0.3s;
        font-family: inherit;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        box-shadow: 0 8px 24px rgba(254,229,0,0.3);
      }

      .kakao-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 32px rgba(254,229,0,0.4);
      }

      /* ===== 공유 섹션 ===== */
      .share-section {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 16px;
        padding: 24px;
        margin-bottom: 24px;
        text-align: center;
      }

      .share-label {
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 16px;
      }

      .share-buttons {
        display: flex;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .share-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 12px 16px;
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 10px;
        background: rgba(255,255,255,0.05);
        color: var(--text);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
      }

      .share-btn:hover {
        background: rgba(255,255,255,0.1);
        border-color: var(--accent);
      }

      .share-btn .share-icon {
        font-size: 16px;
      }

      .share-btn.kakao {
        background: #fee500;
        color: #1a1a1a;
        border-color: #fee500;
      }

      .share-btn.kakao:hover {
        background: #ffd900;
        border-color: #ffd900;
      }

      .share-btn.link:hover {
        background: rgba(96,165,250,0.2);
        border-color: #60a5fa;
      }

      .share-btn.twitter:hover {
        background: rgba(255,255,255,0.15);
        border-color: #fff;
      }

      .share-btn.save-image {
        background: linear-gradient(135deg, var(--accent), var(--primary));
        color: white;
        border-color: var(--accent);
      }

      .share-btn.save-image:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(79,209,197,0.4);
      }

      /* 캡처용 결과 카드 */
      .capture-card {
        background: linear-gradient(180deg, #0f0f1a 0%, #1a1a2e 100%);
        padding: 40px 32px;
        border-radius: 24px;
        text-align: center;
        width: 480px;
      }

      .capture-card .capture-title {
        font-size: 13px;
        color: var(--accent);
        margin-bottom: 6px;
        letter-spacing: 1px;
      }

      .capture-card .capture-main-title {
        font-size: 24px;
        font-weight: 900;
        margin-bottom: 24px;
        color: white;
      }

      .capture-card .capture-chart-area {
        margin-bottom: 24px;
      }

      .capture-card .capture-scores {
        text-align: left;
        padding: 20px;
        background: rgba(255,255,255,0.03);
        border-radius: 16px;
        margin-bottom: 20px;
      }

      .capture-card .capture-score-item {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 10px;
      }

      .capture-card .capture-score-item:last-child {
        margin-bottom: 0;
      }

      .capture-card .capture-score-name {
        font-size: 13px;
        font-weight: 600;
        color: white;
        width: 90px;
        flex-shrink: 0;
      }

      .capture-card .capture-score-bar-bg {
        flex: 1;
        height: 10px;
        background: rgba(255,255,255,0.1);
        border-radius: 5px;
        overflow: hidden;
      }

      .capture-card .capture-score-bar-fill {
        height: 100%;
        border-radius: 5px;
      }

      .capture-card .capture-score-value {
        font-size: 13px;
        font-weight: 700;
        color: var(--accent);
        width: 40px;
        text-align: right;
      }

      .capture-card .capture-type-badge {
        display: inline-block;
        background: var(--accent);
        color: var(--dark);
        font-size: 15px;
        font-weight: 700;
        padding: 10px 24px;
        border-radius: 24px;
        margin-top: 8px;
      }

      .capture-card .capture-footer {
        margin-top: 24px;
        padding-top: 20px;
        border-top: 1px solid rgba(255,255,255,0.1);
        font-size: 13px;
        color: var(--text-subtle);
      }

      .share-hint {
        margin-top: 12px;
        font-size: 13px;
        color: var(--accent);
        min-height: 20px;
      }

      /* 모든 유형 보기 섹션 */
      .all-types-section {
        margin-bottom: 24px;
      }

      .all-types-toggle {
        width: 100%;
        padding: 16px 20px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 14px;
        color: var(--text);
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: space-between;
        transition: all 0.2s;
        font-family: inherit;
      }

      .all-types-toggle:hover {
        background: rgba(255,255,255,0.06);
        border-color: var(--accent);
      }

      .all-types-toggle .toggle-icon {
        transition: transform 0.3s;
      }

      .all-types-toggle.open .toggle-icon {
        transform: rotate(180deg);
      }

      .all-types-content {
        display: none;
        margin-top: 12px;
      }

      .all-types-content.show {
        display: block;
      }

      .type-card {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 14px;
        padding: 20px;
        margin-bottom: 12px;
      }

      .type-card:last-child {
        margin-bottom: 0;
      }

      .type-card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .type-card-name {
        font-size: 16px;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .type-card-name .type-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }

      .type-card-score {
        font-size: 15px;
        font-weight: 700;
        color: var(--accent);
      }

      .type-card-desc {
        font-size: 14px;
        color: var(--text-muted);
        line-height: 1.7;
        margin-bottom: 12px;
      }

      .type-card-needs {
        font-size: 13px;
        color: var(--text-subtle);
      }

      .type-card-needs strong {
        color: var(--accent);
      }

      /* ===== SNS 링크 ===== */
      .social-links {
        text-align: center;

      function calculateScores() {
        const scores = { starter: 0, attention: 0, emotional: 0, impulsive: 0, environment: 0, complex: 0 };

        Object.keys(state.answers).forEach(qId => {
          const question = QUESTIONS.find(q => q.id === parseInt(qId));
          const selectedIndices = state.answers[qId];

          selectedIndices.forEach(idx => {
            const option = question.options[idx];
            if (option.types) {
              Object.keys(option.types).forEach(type => {
                scores[type] += option.types[type];
              });
            }
          });
        });

        const maxPossible = QUESTIONS.reduce((sum, q) => {
          const maxPerQ = q.options.reduce((max, opt) => {
            const optMax = Object.values(opt.types || {}).reduce((a, b) => a + b, 0);
            return Math.max(max, optMax);
          }, 0) * 3; // 질문당 최대 3개 선택 가정
          return sum + maxPerQ;
        }, 0) / 6;

        const percentages = {};
        Object.keys(scores).forEach(type => {
          percentages[type] = Math.min(100, Math.round((scores[type] / 10) * 100));
        });

        return percentages;

      // ===== 레이더 차트 SVG 생성 =====
      function createRadarChart(scores) {
        const types = ['starter', 'attention', 'emotional', 'impulsive', 'environment', 'complex'];
        const centerX = 160;
        const centerY = 160;
        const maxRadius = 120;

        // 각 꼭지점 각도 (시작점: 위쪽, 시계 방향)
        const angles = types.map((_, i) => (Math.PI * 2 * i / 6) - Math.PI / 2);

        // 배경 육각형들 (20%, 40%, 60%, 80%, 100%)
        let bgHexagons = '';
        [0.2, 0.4, 0.6, 0.8, 1].forEach(scale => {
          const points = angles.map(angle => {
            const x = centerX + Math.cos(angle) * maxRadius * scale;
            const y = centerY + Math.sin(angle) * maxRadius * scale;
            return `${x},${y}`;
          }).join(' ');
          bgHexagons += `<polygon points="${points}" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>`;
        });

        // 축 선
        let axisLines = '';
        angles.forEach(angle => {
          const x = centerX + Math.cos(angle) * maxRadius;
          const y = centerY + Math.sin(angle) * maxRadius;
          axisLines += `<line x1="${centerX}" y1="${centerY}" x2="${x}" y2="${y}" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>`;
        });

        // 데이터 다각형
        const dataPoints = types.map((type, i) => {
          const value = scores[type] / 100;
          const x = centerX + Math.cos(angles[i]) * maxRadius * value;
          const y = centerY + Math.sin(angles[i]) * maxRadius * value;
          return `${x},${y}`;
        }).join(' ');

        // 데이터 포인트 (점)
        let dataCircles = '';
        types.forEach((type, i) => {
          const value = scores[type] / 100;
          const x = centerX + Math.cos(angles[i]) * maxRadius * value;
          const y = centerY + Math.sin(angles[i]) * maxRadius * value;
          dataCircles += `<circle cx="${x}" cy="${y}" r="5" fill="${TYPES[type].color}"/>`;
        });

        return `
          <svg viewBox="0 0 320 320" class="radar-chart">
            ${bgHexagons}
            ${axisLines}
            <polygon points="${dataPoints}" fill="rgba(79,209,197,0.3)" stroke="var(--accent)" stroke-width="2"/>
            ${dataCircles}
          </svg>
        `;
      }

        let optionsHtml = '';
        question.options.forEach((option, index) => {
          const isChecked = selectedIndices.includes(index);
          optionsHtml += `
            <div class="checkbox-option ${isChecked ? 'checked' : ''}" onclick="toggleOption(${question.id}, ${index})">
              <span class="checkbox-box">${isChecked ? '>' : ''}</span>
              <span class="checkbox-label">${option.text}</span>
            </div>
          `;
        });

        const canGoNext = selectedIndices.length > 0;
        const isLastQuestion = state.currentQuestion === totalQuestions - 1;

        return `
          <div class="progress-text">${state.currentQuestion + 1} / ${totalQuestions}</div>
          <div class="progress-bar-container">
            <div class="progress-bar" style="width: ${progress}%"></div>
          </div>
          ${state.currentQuestion > 0 ? '<button class="back-button" onclick="goBack()">< 이전</button>' : '<button class="back-button" onclick="goToStart()">< 처음으로</button>'}
          <div class="card question-page fade-in">
            <span class="question-number">Q${state.currentQuestion + 1}</span>
            <h2>${question.text}</h2>
            <p class="question-hint">${question.hint}</p>
            <div class="options-list">${optionsHtml}</div>
            <button class="primary-btn" onclick="${isLastQuestion ? 'goToAnalyzing()' : 'nextQuestion()'}" ${!canGoNext ? 'disabled' : ''}>
              ${isLastQuestion ? '결과 보기' : '다음'}
            </button>
          </div>
        `;
      }

      function renderAnalyzingPage() {
        setTimeout(() => {
          state.scores = calculateScores();
          state.currentPage = 'result';
          render();
        }, 2500);

        return `
          <div class="card analyzing-page fade-in">
            <div class="analyzing-spinner"></div>
            <h2>응답을 분석하고 있어요</h2>
            <p>
              6가지 유형을 복합 분석하여<br>
              당신만의 실행 패턴을 정리하고 있습니다.
            </p>
          </div>
        `;
      }

      function renderResultPage() {
        const scores = state.scores;

        // 가장 높은 유형 찾기
        const sortedTypes = Object.keys(scores).sort((a, b) => scores[b] - scores[a]);
        const primaryType = sortedTypes[0];
        const secondaryType = sortedTypes[1];
        const result = TYPE_RESULTS[primaryType];

        // GA 이벤트: 테스트 완료
        gtag('event', 'survey_complete', {
          'event_category': 'conversion',
          'event_label': 'adhd_pattern_result',
          'primary_type': result.title,
          'primary_score': scores[primaryType]
        });

        // 레이더 차트
        const radarChart = createRadarChart(scores);
        const radarLabels = getRadarLabels(scores);

        // 점수 바
        let scoreBarsHtml = '';
        sortedTypes.forEach(type => {
          scoreBarsHtml += `
            <div class="score-item">
              <div class="score-header">
                <span class="score-name">${TYPES[type].name}</span>
                <span class="score-value">${scores[type]}%</span>
              </div>
              <div class="score-bar-bg">
                <div class="score-bar-fill ${type}" style="width: ${scores[type]}%"></div>
              </div>
            </div>
          `;
        });

        // 필요한 것 리스트
        let needsHtml = '';
        result.needs.forEach(need => {
          needsHtml += `<li>${need}</li>`;
        });

        // 모든 유형 카드 HTML
        const typeColors = {
          starter: '#f87171',
          attention: '#fb923c',
          emotional: '#facc15',
          impulsive: '#4ade80',
          environment: '#60a5fa',
          complex: '#c084fc'
        };

        let allTypesHtml = '';
        sortedTypes.forEach(type => {
          const typeResult = TYPE_RESULTS[type];
          const typeNeeds = typeResult.needs.slice(0, 2).join(', ');
          allTypesHtml += `
            <div class="type-card">
              <div class="type-card-header">
                <span class="type-card-name">
                  <span class="type-dot" style="background: ${typeColors[type]};"></span>
                  ${typeResult.title}
                </span>
                <span class="type-card-score">${scores[type]}%</span>
              </div>
              <p class="type-card-desc">${typeResult.description}</p>
              <p class="type-card-needs"><strong>필요한 것:</strong> ${typeNeeds}</p>
            </div>
          `;
        });

        return `
          <div class="card result-page fade-in">
            <h1>당신의 실행 패턴 분석 결과</h1>
            <p class="result-subtitle">6가지 유형 복합 분석</p>

            <div class="radar-container">
              ${radarChart}
              <div class="radar-labels">
                ${radarLabels}
              </div>
            </div>

            <div class="score-bars">
              ${scoreBarsHtml}
            </div>

            <div class="primary-type-card">
              <span class="primary-type-badge">주요 유형</span>
              <h2>${result.title}</h2>
              <p>${result.summary}</p>
            </div>

            <div class="analysis-section">
              <h3>왜 이런 패턴이 생기나요?</h3>
              <p>${result.description}</p>
            </div>

            <div class="analysis-section">
              <h3>지금 가장 필요한 것</h3>
              <ul>${needsHtml}</ul>
            </div>

            ${scores[secondaryType] >= 30 ? `
            <div class="analysis-section">
              <h3>함께 나타나는 유형</h3>
              <p><strong>${TYPES[secondaryType].name}</strong> (${scores[secondaryType]}%) - ${TYPES[secondaryType].description}</p>
            </div>
            ` : ''}

            <div class="all-types-section">
              <button class="all-types-toggle" onclick="toggleAllTypes(this)">
                <span>모든 유형 설명 보기</span>
                <span class="toggle-icon">▼</span>
              </button>
              <div class="all-types-content" id="allTypesContent">
                ${allTypesHtml}
              </div>
            </div>

            <div class="analysis-section" style="background: rgba(79,209,197,0.1); border: 1px solid rgba(79,209,197,0.3);">
              <h3 style="color: var(--accent);">${result.title}에게 추천</h3>
              <p>
                <strong>${result.resource}</strong>가 도움이 될 수 있어요.
                ${result.isCoaching ? '<br>ADHD 당사자가 직접 1:1로 상담해드려요.' : ''}
              </p>
            </div>

            <div class="email-form-section">
              <h3 style="font-size: 18px; font-weight: 700; margin-bottom: 12px; text-align: center;">
                무료 ADHD 관리자료 PDF받기
              </h3>
              <p style="font-size: 14px; color: var(--text-muted); text-align: center; margin-bottom: 20px;">
                이메일을 남기시면 유형에 맞는 자료를 보내드려요
              </p>
              <form class="result-email-form" onsubmit="submitResultEmail(event, '${result.title}')">
                <input type="text" name="name" placeholder="이름" required style="width: 100%; padding: 14px 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; background: rgba(255,255,255,0.08); color: white; font-size: 15px;">
                <input type="email" name="email" placeholder="이메일" required style="width: 100%; padding: 14px 16px; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; background: rgba(255,255,255,0.08); color: white; font-size: 15px;">
                <button type="submit" class="primary-btn">맞춤 PDF 받기</button>
              </form>
            </div>


            <div class="share-section">
              <p class="share-label">친구에게 공유하기</p>
              <div class="share-buttons">
                <button class="share-btn save-image" onclick="saveResultImage()">
                  <span class="share-icon">📸</span>
                  <span>이미지 저장</span>
                </button>
                <button class="share-btn kakao" onclick="shareResult('kakao')">
                  <span class="share-icon">💬</span>
                  <span>카카오톡</span>
                </button>
                <button class="share-btn link" onclick="shareResult('link')">
                  <span class="share-icon">🔗</span>
                  <span>링크 복사</span>
                </button>
              </div>
              <p class="share-hint" id="shareHint"></p>
            </div>

            <!-- 캡처용 숨겨진 카드 -->
            <div id="captureArea" style="position: absolute; left: -9999px; top: 0;">
              <div class="capture-card">
                <p class="capture-title">ADHD 실행 패턴 분석</p>
                <h2 class="capture-main-title">나의 실행 패턴 결과</h2>
                <div class="capture-chart-area" id="captureChart"></div>
                <div class="capture-scores" id="captureScores"></div>
                <div class="capture-type-badge">주요 유형: ${result.title} ${scores[primaryType]}%</div>
                ${scores[secondaryType] >= 30 ? `<p style="margin-top: 12px; font-size: 14px; color: rgba(255,255,255,0.7);">보조 유형: ${TYPE_RESULTS[secondaryType].title} ${scores[secondaryType]}%</p>` : ''}
                <div class="capture-footer">
                  나도 테스트 해보기 👉 floca.kr/survey
                </div>
              </div>
            </div>


            <div class="footer-note">
              이 결과는 당신을 규정하기 위한 것이 아니라,<br>
              어떤 방식이 더 필요할지 찾기 위한 출발점입니다.
            </div>
          </div>
        `;
      }

      // ===== 이미지 저장 기능 =====
      function saveResultImage() {
        const hintEl = document.getElementById('shareHint');
        hintEl.textContent = '이미지 생성 중...';

        const scores = state.scores;
        const sortedTypes = Object.keys(scores).sort((a, b) => scores[b] - scores[a]);
        const primaryType = sortedTypes[0];
        const result = TYPE_RESULTS[primaryType];

        // 캡처 영역에 차트 복사
        const captureChart = document.getElementById('captureChart');
        const radarContainer = document.querySelector('.radar-container');
        if (radarContainer && captureChart) {
          captureChart.innerHTML = radarContainer.innerHTML;
          captureChart.style.cssText = 'width: 320px; height: 320px; margin: 0 auto; position: relative;';
          const svg = captureChart.querySelector('svg');
          if (svg) {
            svg.style.width = '100%';
            svg.style.height = '100%';
          }
          const radarLabels = captureChart.querySelector('.radar-labels');
          if (radarLabels) {
            radarLabels.style.cssText = 'position: absolute; width: 100%; height: 100%; top: 0; left: 0;';
          }
          const labels = captureChart.querySelectorAll('.radar-label');
          labels.forEach(label => {
            label.style.fontSize = '12px';
            label.style.fontWeight = '600';
          });
        }

        // 바 그래프 생성
        const captureScores = document.getElementById('captureScores');
        if (captureScores) {
          const barColors = {
            starter: '#f87171',
            attention: '#fb923c',
            emotional: '#facc15',
            impulsive: '#4ade80',
            environment: '#60a5fa',
            complex: '#c084fc'
          };

          let scoresHtml = '';
          sortedTypes.forEach(type => {
            scoresHtml += `
              <div class="capture-score-item">
                <span class="capture-score-name">${TYPES[type].name}</span>
                <div class="capture-score-bar-bg">
                  <div class="capture-score-bar-fill" style="width: ${scores[type]}%; background: ${barColors[type]};"></div>
                </div>
                <span class="capture-score-value">${scores[type]}%</span>
              </div>
            `;
          });
          captureScores.innerHTML = scoresHtml;
        }

        // 캡처 영역을 화면에 임시로 표시
        const captureArea = document.getElementById('captureArea');
        captureArea.style.left = '0';
        captureArea.style.position = 'fixed';
        captureArea.style.top = '0';
        captureArea.style.zIndex = '-1';
        captureArea.style.opacity = '1';

        setTimeout(() => {
          const captureCard = captureArea.querySelector('.capture-card');

          html2canvas(captureCard, {
            backgroundColor: '#0f0f1a',
            scale: 2,
            useCORS: true,
            logging: false
          }).then(canvas => {
            captureArea.style.left = '-9999px';
            captureArea.style.position = 'absolute';

            const link = document.createElement('a');
            link.download = `ADHD_실행패턴_${result.title}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();

            hintEl.innerHTML = '✅ 저장 완료! <strong>카카오톡에서 이미지를 공유</strong>해보세요';
            setTimeout(() => { hintEl.textContent = ''; }, 5000);
          }).catch(err => {
            captureArea.style.left = '-9999px';
            captureArea.style.position = 'absolute';
            hintEl.textContent = '이미지 저장에 실패했어요. 스크린샷을 이용해주세요.';
            console.error('Image capture error:', err);
          });
        }, 150);
      }

      // ===== 공유 기능 =====
      function shareResult(type) {
        const scores = state.scores;
        const sortedTypes = Object.keys(scores).sort((a, b) => scores[b] - scores[a]);
        const primaryType = sortedTypes[0];
        const secondaryType = sortedTypes[1];
        const result = TYPE_RESULTS[primaryType];

        const shareUrl = window.location.href.split('?')[0];
        const hintEl = document.getElementById('shareHint');

        // 카카오톡용 공유 텍스트 (이모지 포함, 보기 좋게)
        const kakaoText = `✨ 나의 ADHD 실행 패턴 분석 결과 ✨

🏆 주요 유형: ${result.title} (${scores[primaryType]}%)
${scores[secondaryType] >= 30 ? `🥈 보조 유형: ${TYPE_RESULTS[secondaryType].title} (${scores[secondaryType]}%)` : ''}

📌 "${result.summary}"

🔗 나도 테스트 해보기
${shareUrl}`;

        const twitterText = `나의 ADHD 실행 패턴은 "${result.title}"!\n\n${result.summary}\n\n나도 테스트 해보기 👇`;

        if (type === 'kakao') {
          navigator.clipboard.writeText(kakaoText).then(() => {
            hintEl.innerHTML = '✅ 복사 완료! <strong>카카오톡에 붙여넣기</strong> 해주세요';
            setTimeout(() => { hintEl.textContent = ''; }, 4000);
          }).catch(() => {
            // 클립보드 실패 시 직접 표시
            prompt('아래 텍스트를 복사해서 카카오톡에 붙여넣기 해주세요:', kakaoText);
          });
        }
        else if (type === 'link') {
          navigator.clipboard.writeText(shareUrl).then(() => {
            hintEl.textContent = '✅ 링크가 복사되었어요!';
            setTimeout(() => { hintEl.textContent = ''; }, 3000);
          }).catch(() => {
            hintEl.textContent = '링크: ' + shareUrl;
          });
        }
        else if (type === 'twitter') {
          const twitterUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(twitterText)}&url=${encodeURIComponent(shareUrl)}`;
          window.open(twitterUrl, '_blank', 'width=550,height=420');
        }
      }

      // ===== 이벤트 핸들러 =====
      function startTest() {
        // GA 이벤트: 테스트 시작
        gtag('event', 'survey_start', {
          'event_category': 'engagement',
          'event_label': 'adhd_pattern_test'
        });

        state.currentQuestion = 0;
        state.answers = {};
        state.scores = { starter: 0, attention: 0, emotional: 0, impulsive: 0, environment: 0, complex: 0 };
        state.history = ['start'];
        state.currentPage = 'question';
        render();
      }

      function toggleOption(questionId, optionIndex) {
        if (!state.answers[questionId]) {
          state.answers[questionId] = [];
        }

        const idx = state.answers[questionId].indexOf(optionIndex);
        if (idx > -1) {
          state.answers[questionId].splice(idx, 1);
        } else {
          state.answers[questionId].push(optionIndex);
        }
        render(true); // 스크롤 유지
      }

      function nextQuestion() {
        if (state.currentQuestion < QUESTIONS.length - 1) {
          state.history.push('question');
          state.currentQuestion++;
          render();
        }
      }

      function goBack() {
        if (state.currentQuestion > 0) {
          state.currentQuestion--;
          render();
        }
      }

      function goToStart() {
        state.currentPage = 'start';
        state.currentQuestion = 0;
        state.answers = {};
        state.history = [];
        render();
      }

      function goToAnalyzing() {
        state.currentPage = 'analyzing';
        render();
      }

      function toggleAllTypes(btn) {
        btn.classList.toggle('open');
        const content = document.getElementById('allTypesContent');
        content.classList.toggle('show');
      }

      // ===== 메인 렌더 함수 =====
      function render(keepScroll = false) {
        const app = document.getElementById('app');
        let html = '';

        switch (state.currentPage) {
          case 'start':
            html = renderStartPage();
            break;
          case 'question':
            html = renderQuestionPage();
            break;
          case 'analyzing':
            html = renderAnalyzingPage();
            break;
          case 'result':
            html = renderResultPage();
            break;
          default:
            html = renderStartPage();
        }

        app.innerHTML = html;
        if (!keepScroll) {
          window.scrollTo(0, 0);
        }

        // 결과 페이지에서 카카오톡 클릭 추적
        if (state.currentPage === 'result') {
          document.querySelectorAll('a[href*="open.kakao.com"]').forEach(function(link) {
            link.addEventListener('click', function() {
              gtag('event', 'kakao_click', {
                'event_category': 'conversion',
                'event_label': 'survey_result_kakao'
              });
            });
          });
        }
      }

      // ===== 이메일 제출 =====
      function submitResultEmail(event, resultType) {
        event.preventDefault();
        const form = event.target;
        const name = form.querySelector('input[name="name"]').value.trim();
        const email = form.querySelector('input[name="email"]').value.trim();
        const submitBtn = form.querySelector('button[type="submit"]');

        if (!name || !email) return;

        // 결과를 localStorage에 저장 (thanks.html에서 사용)
        localStorage.setItem('floca_result_type', resultType);
        localStorage.setItem('floca_user_name', name);

        submitBtn.disabled = true;
        submitBtn.textContent = '처리 중...';

        // GA 이벤트
        gtag('event', 'lead_submit', {
          'event_category': 'conversion',
          'event_label': 'survey_result_pdf',
          'result_type': resultType
        });

        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz59rkWc3MHBgIxTNKsmKObJOhWR43tXAXzi8MC10ILMcVgBaseXXFWXqMTGQX2rLY/exec';

        fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, resultType })
        })
        .then(function() {
          window.location.href = 'thanks.html';
        })
        .catch(function() {
          window.location.href = 'thanks.html';
        });
      }

      // ===== 초기화 =====
      document.addEventListener('DOMContentLoaded', render);
    </script>
  </body>
</html>
