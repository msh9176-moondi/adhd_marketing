<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ADHD 실행 패턴 분석 | 3분 테스트</title>
    <meta
      name="description"
      content="3분 안에 나의 ADHD 실행 패턴을 파악해보세요."
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ===== 기본 리셋 및 변수 ===== */
      :root {
        --primary-color: #2a7b9b;
        --primary-hover: #1e6a87;
        --primary-light: #e8f4f8;
        --text-dark: #1a1a2e;
        --text-medium: #4a4a5a;
        --text-light: #6b6b7b;
        --bg-white: #ffffff;
        --bg-light: #f8fafb;
        --border-color: #e0e6ea;
        --success-color: #2e8b57;
        --success-bg: #e8f5ee;
        --warning-color: #e67e22;
        --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
        --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.1);
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          'Noto Sans KR',
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        line-height: 1.7;
        color: var(--text-dark);
        background-color: var(--bg-light);
        min-height: 100vh;
      }

      /* ===== 레이아웃 ===== */
      .survey-container {
        max-width: 640px;
        margin: 0 auto;
        padding: 20px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ===== 진행률 바 ===== */
      .progress-bar-container {
        background: var(--border-color);
        border-radius: 10px;
        height: 8px;
        margin-bottom: 24px;
        overflow: hidden;
      }

      .progress-bar {
        background: linear-gradient(90deg, var(--primary-color), #3498db);
        height: 100%;
        border-radius: 10px;
        transition: width 0.4s ease;
      }

      .progress-text {
        text-align: center;
        font-size: 13px;
        color: var(--text-light);
        margin-bottom: 16px;
      }

      /* ===== 뒤로가기 버튼 ===== */
      .back-button {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: none;
        border: none;
        color: var(--text-light);
        font-size: 14px;
        cursor: pointer;
        padding: 8px 0;
        margin-bottom: 16px;
        transition: color 0.2s;
        font-family: inherit;
      }

      .back-button:hover {
        color: var(--primary-color);
      }

      /* ===== 카드 ===== */
      .card {
        background: var(--bg-white);
        border-radius: var(--radius-lg);
        padding: 32px 24px;
        box-shadow: var(--shadow-md);
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      /* ===== 시작 페이지 ===== */
      .start-page {
        text-align: center;
        justify-content: center;
      }

      .start-page h1 {
        font-size: 26px;
        font-weight: 700;
        color: var(--text-dark);
        margin-bottom: 20px;
        word-break: keep-all;
      }

      .start-page .description {
        font-size: 15px;
        color: var(--text-medium);
        line-height: 1.8;
        margin-bottom: 32px;
        word-break: keep-all;
      }

      .start-badge {
        display: inline-block;
        background: var(--primary-light);
        color: var(--primary-color);
        font-size: 13px;
        font-weight: 500;
        padding: 6px 14px;
        border-radius: 20px;
        margin-bottom: 20px;
      }

      /* ===== 질문 페이지 ===== */
      .question-page h2 {
        font-size: 20px;
        font-weight: 700;
        color: var(--text-dark);
        margin-bottom: 8px;
        word-break: keep-all;
        line-height: 1.5;
      }

      .question-hint {
        font-size: 14px;
        color: var(--text-light);
        margin-bottom: 24px;
      }

      /* ===== 선택지 ===== */
      .options-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 24px;
      }

      .option-item {
        background: var(--bg-light);
        border: 2px solid var(--border-color);
        border-radius: var(--radius-md);
        padding: 16px 20px;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 15px;
        color: var(--text-medium);
        word-break: keep-all;
      }

      .option-item:hover {
        border-color: var(--primary-color);
        background: var(--primary-light);
      }

      .option-item.selected {
        border-color: var(--primary-color);
        background: var(--primary-light);
        color: var(--primary-color);
        font-weight: 500;
      }

      /* ===== 체크박스 옵션 ===== */
      .checkbox-option {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        background: var(--bg-light);
        border: 2px solid var(--border-color);
        border-radius: var(--radius-md);
        padding: 16px 20px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .checkbox-option:hover {
        border-color: var(--primary-color);
      }

      .checkbox-option.checked {
        border-color: var(--primary-color);
        background: var(--primary-light);
      }

      .checkbox-box {
        width: 22px;
        height: 22px;
        border: 2px solid var(--border-color);
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: all 0.2s;
        font-size: 14px;
        color: white;
      }

      .checkbox-option.checked .checkbox-box {
        background: var(--primary-color);
        border-color: var(--primary-color);
      }

      .checkbox-label {
        font-size: 15px;
        color: var(--text-medium);
        word-break: keep-all;
        line-height: 1.5;
      }

      /* ===== 버튼 ===== */
      .primary-btn {
        width: 100%;
        padding: 16px 24px;
        font-size: 17px;
        font-weight: 700;
        color: var(--bg-white);
        background: var(--primary-color);
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.1s;
        margin-top: auto;
        font-family: inherit;
        text-decoration: none;
        display: block;
        text-align: center;
      }

      .primary-btn:hover:not(:disabled) {
        background: var(--primary-hover);
      }

      .primary-btn:active:not(:disabled) {
        transform: scale(0.98);
      }

      .primary-btn:disabled {
        background: var(--border-color);
        cursor: not-allowed;
      }

      .secondary-btn {
        width: 100%;
        padding: 14px 20px;
        font-size: 15px;
        font-weight: 500;
        color: var(--primary-color);
        background: var(--primary-light);
        border: 2px solid transparent;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
        text-align: center;
        display: block;
        font-family: inherit;
      }

      .secondary-btn:hover {
        border-color: var(--primary-color);
      }

      /* ===== 분석 중 페이지 ===== */
      .analyzing-page {
        text-align: center;
        justify-content: center;
        align-items: center;
      }

      .analyzing-spinner {
        width: 60px;
        height: 60px;
        border: 4px solid var(--border-color);
        border-top-color: var(--primary-color);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 24px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .analyzing-page h2 {
        font-size: 20px;
        font-weight: 700;
        color: var(--text-dark);
        margin-bottom: 16px;
        word-break: keep-all;
      }

      .analyzing-page p {
        font-size: 15px;
        color: var(--text-medium);
        line-height: 1.8;
        word-break: keep-all;
      }

      .analyzing-hint {
        margin-top: 24px;
        font-size: 14px;
        color: var(--text-light);
        font-style: italic;
      }

      /* ===== 결과 페이지 ===== */
      .result-page {
        padding-bottom: 40px;
      }

      .result-type-badge {
        display: inline-block;
        background: var(--primary-color);
        color: white;
        font-size: 13px;
        font-weight: 500;
        padding: 6px 14px;
        border-radius: 20px;
        margin-bottom: 16px;
      }

      .result-page h1 {
        font-size: 24px;
        font-weight: 700;
        color: var(--text-dark);
        margin-bottom: 12px;
        word-break: keep-all;
      }

      .result-summary {
        font-size: 16px;
        color: var(--primary-color);
        font-weight: 500;
        margin-bottom: 24px;
        padding: 16px;
        background: var(--primary-light);
        border-radius: var(--radius-md);
        word-break: keep-all;
        line-height: 1.7;
      }

      .result-section {
        margin-bottom: 24px;
      }

      .result-section h3 {
        font-size: 16px;
        font-weight: 700;
        color: var(--text-dark);
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .result-section h3::before {
        content: '';
        width: 4px;
        height: 18px;
        background: var(--primary-color);
        border-radius: 2px;
      }

      .result-section p {
        font-size: 15px;
        color: var(--text-medium);
        line-height: 1.8;
        word-break: keep-all;
      }

      .result-highlight {
        background: var(--success-bg);
        border-left: 4px solid var(--success-color);
        padding: 16px;
        border-radius: 0 var(--radius-md) var(--radius-md) 0;
        margin-bottom: 24px;
      }

      .result-highlight h4 {
        font-size: 15px;
        font-weight: 700;
        color: var(--text-dark);
        margin-bottom: 8px;
      }

      .result-highlight p {
        color: var(--text-dark);
        font-weight: 500;
      }

      /* ===== 추천 섹션 ===== */
      .recommendations {
        background: var(--bg-light);
        border-radius: var(--radius-lg);
        padding: 24px;
        margin-bottom: 24px;
      }

      .recommendations h3 {
        font-size: 18px;
        font-weight: 700;
        color: var(--text-dark);
        margin-bottom: 16px;
        text-align: center;
      }

      .recommendation-item {
        background: var(--bg-white);
        border-radius: var(--radius-md);
        padding: 16px;
        margin-bottom: 12px;
        border: 1px solid var(--border-color);
        text-decoration: none;
        display: block;
        transition: border-color 0.2s;
      }

      .recommendation-item:hover {
        border-color: var(--primary-color);
      }

      .recommendation-item:last-child {
        margin-bottom: 0;
      }

      .recommendation-badge {
        display: inline-block;
        font-size: 11px;
        font-weight: 700;
        padding: 3px 8px;
        border-radius: 4px;
        margin-bottom: 8px;
      }

      .badge-free {
        background: var(--success-bg);
        color: var(--success-color);
      }

      .badge-tool {
        background: var(--primary-light);
        color: var(--primary-color);
      }

      .badge-advanced {
        background: #fff3e0;
        color: var(--warning-color);
      }

      .recommendation-item h4 {
        font-size: 15px;
        font-weight: 600;
        color: var(--text-dark);
        margin-bottom: 4px;
      }

      .recommendation-item p {
        font-size: 13px;
        color: var(--text-light);
      }

      .rec-btn {
        display: inline-block;
        margin-top: 12px;
        padding: 8px 16px;
        background: var(--primary-color);
        color: white;
        font-size: 13px;
        font-weight: 600;
        border-radius: 6px;
        transition: background 0.2s;
      }

      .recommendation-item:hover .rec-btn {
        background: var(--primary-hover);
      }

      /* ===== CTA 버튼 그룹 ===== */
      .cta-group {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 32px;
      }

      /* ===== 하단 문구 ===== */
      .footer-note {
        text-align: center;
        font-size: 14px;
        color: var(--text-light);
        line-height: 1.7;
        padding: 20px;
        background: var(--bg-light);
        border-radius: var(--radius-md);
        word-break: keep-all;
      }

      /* ===== 반응형 ===== */
      @media (min-width: 768px) {
        .survey-container {
          padding: 40px 20px;
        }

        .card {
          padding: 40px 32px;
        }

        .start-page h1 {
          font-size: 32px;
        }

        .question-page h2 {
          font-size: 24px;
        }

        .result-page h1 {
          font-size: 28px;
        }
      }

      /* ===== 애니메이션 ===== */
      .fade-in {
        animation: fadeIn 0.3s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>

                    <button class="primary-btn" onclick="goToPage('profile')">

            `;
      }

      function renderQuestionPage(questionKey, step) {
        const question = QUESTIONS[questionKey];
        const selected = state.answers[questionKey];

        let optionsHtml = '';
        question.options.forEach((option, index) => {
          const optionText = typeof option === 'object' ? option.text : option;
          const optionValue = typeof option === 'object' ? option.type : index;
          const isSelected = selected === optionValue;
          optionsHtml += `
                    <li class="option-item ${isSelected ? 'selected' : ''}"
                        onclick="selectOption('${questionKey}', ${typeof option === 'object' ? `'${option.type}'` : index})">
                        ${optionText}
                    </li>
                `;
        });

        const nextPage = getNextPage(questionKey);

        return `
                <div class="progress-text">${step} / 6</div>
                <div class="progress-bar-container">
                    <div class="progress-bar" style="width: ${(step / 6) * 100}%"></div>
                </div>
                ${step > 1 ? '<button class="back-button" onclick="goBack()">← 이전으로</button>' : ''}
                <div class="card question-page fade-in">
                    <h2>${question.title}</h2>
                    <p class="question-hint">${question.hint}</p>
                    <ul class="options-list">
                        ${optionsHtml}
                    </ul>
                    <button class="primary-btn" onclick="goToPage('${nextPage}')" ${selected === null ? 'disabled' : ''}>
                        다음
                    </button>
                </div>
            `;
      }

      function renderTypeQuestionPage() {
        const type = state.answers.core;
        const question = TYPE_QUESTIONS[type] || TYPE_QUESTIONS.complex;

        let optionsHtml = '';
        question.options.forEach((option, index) => {
          optionsHtml += `

        });

                    </ul>
                    <button class="primary-btn" onclick="goToPage('analyzing')">

                    </button>
                </div>
            `;

      let checkedItems = [];
      function toggleCheckbox(index) {
        const checkbox = document.getElementById('checkbox-' + index);
        const checkmark = document.getElementById('checkmark-' + index);

        if (checkedItems.includes(index)) {
          checkedItems = checkedItems.filter((i) => i !== index);
          checkbox.classList.remove('checked');
          checkmark.textContent = '';
        } else if (checkedItems.length < 3) {
          checkedItems.push(index);
          checkbox.classList.add('checked');
          checkmark.textContent = '✓';
        }
      }

        // 결과 유형에 따라 추천 순서 조정
        const sortedRecs = [...recommendations].sort((a, b) => {

      // ===== 헬퍼 함수 =====
      function getNextPage(currentPage) {
        const flow = {
          profile: 'knowledge',
          knowledge: 'struggle',
          struggle: 'core',
          core: 'type',
        };
        return flow[currentPage] || 'start';
      }

      function getStep(page) {
        const steps = {
          profile: 1,
          knowledge: 2,
          struggle: 3,
          core: 4,
        };
        return steps[page] || 1;
      }

      // ===== 네비게이션 =====
      function goToPage(page) {
        state.history.push(state.currentPage);
        state.currentPage = page;
        checkedItems = [];
        render();
      }

      function goBack() {
        if (state.history.length > 0) {
          state.currentPage = state.history.pop();
          render();
        }
      }

      function selectOption(questionKey, value) {
        state.answers[questionKey] = value;
        render();
      }

      // ===== 메인 렌더 함수 =====
      function render() {
        const app = document.getElementById('app');
        let html = '';

        switch (state.currentPage) {
          case 'start':
            html = renderStartPage();
            break;
          case 'profile':
          case 'knowledge':
          case 'struggle':
          case 'core':
            html = renderQuestionPage(
              state.currentPage,
              getStep(state.currentPage),
            );
            break;
          case 'type':
            html = renderTypeQuestionPage();
            break;
          case 'analyzing':
            html = renderAnalyzingPage();
            break;
          case 'result':
            html = renderResultPage();
            break;
          default:
            html = renderStartPage();
        }

        app.innerHTML = html;
      }

      // ===== 초기화 =====
      document.addEventListener('DOMContentLoaded', render);
    </script>
  </body>
