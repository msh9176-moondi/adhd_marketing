<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>내 코칭 찾기 | FLOCA 코칭 플랫폼</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { background: linear-gradient(135deg, #0F172A 0%, #1E3A5F 100%); min-height: 100vh; }
    .login-wrap {
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 40px 20px;
    }
    .login-card {
      background: white; border-radius: 24px; padding: 44px 36px;
      max-width: 420px; width: 100%; box-shadow: 0 24px 60px rgba(0,0,0,.3);
    }
    .login-logo { font-size: 22px; font-weight: 900; color: var(--primary); margin-bottom: 8px; }
    .login-logo span { color: var(--accent); }
    .login-title { font-size: 22px; font-weight: 900; color: var(--text); margin-bottom: 6px; }
    .login-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 32px; line-height: 1.7; }

    .login-methods { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
    .method-tab {
      display: flex; align-items: center; gap: 12px; padding: 14px 18px;
      border: 2px solid var(--border); border-radius: 12px; cursor: pointer;
      transition: all .2s; background: white;
    }
    .method-tab:hover { border-color: var(--primary); background: var(--primary-light); }
    .method-tab.active { border-color: var(--primary); background: var(--primary-light); }
    .method-tab .icon { font-size: 24px; flex-shrink: 0; }
    .method-tab h4 { font-size: 14px; font-weight: 700; margin-bottom: 1px; }
    .method-tab p { font-size: 12px; color: var(--text-muted); }

    .method-form { display: none; padding: 20px; background: var(--bg); border-radius: 14px; margin-bottom: 20px; }
    .method-form.active { display: block; }

    .result-card {
      background: var(--success-light); border: 1px solid #BBF7D0;
      border-radius: 14px; padding: 20px; margin-bottom: 16px; display: none;
    }
    .result-card h4 { font-size: 15px; font-weight: 700; color: #166534; margin-bottom: 4px; }
    .result-card p { font-size: 13px; color: #166534; }

    .error-card {
      background: var(--warn-light); border: 1px solid #FECACA;
      border-radius: 14px; padding: 16px; margin-bottom: 16px; display: none;
      font-size: 14px; color: #991B1B; line-height: 1.7;
    }

    .divider-line { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--text-muted); font-size: 13px; }
    .divider-line::before, .divider-line::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .session-card {
      background: var(--primary-light); border: 1px solid #BFDBFE;
      border-radius: 14px; padding: 16px 18px; margin-bottom: 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .session-card-info p { font-size: 13px; color: var(--primary); margin-top: 2px; }
    .session-card-info h4 { font-size: 15px; font-weight: 700; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">FLOCA <span>코칭</span></div>
    <div class="login-title">내 코칭 대시보드로</div>
    <div class="login-sub">전화번호 또는 이름으로 내 코칭을 찾을 수 있어요.</div>

    <!-- 자동 감지: 이전 세션 -->
    <div id="savedSession" style="display:none;">
      <div class="session-card">
        <div class="session-card-info">
          <h4 id="savedName">이전 세션</h4>
          <p id="savedStatus">코칭 진행 중</p>
        </div>
        <a id="savedLink" href="#" class="btn btn-primary btn-sm">바로 입장</a>
      </div>
      <div class="divider-line">또는</div>
    </div>

    <!-- 찾기 방법 -->
    <div class="login-methods">
      <div class="method-tab active" id="tab-phone" onclick="switchMethod('phone')">
        <span class="icon">📱</span>
        <div>
          <h4>전화번호로 찾기</h4>
          <p>신청 시 입력한 전화번호</p>
        </div>
      </div>
      <div class="method-tab" id="tab-name" onclick="switchMethod('name')">
        <span class="icon">🙋</span>
        <div>
          <h4>이름으로 찾기</h4>
          <p>신청 시 입력한 이름 또는 닉네임</p>
        </div>
      </div>
    </div>

    <!-- 전화번호 폼 -->
    <div class="method-form active" id="form-phone">
      <div class="form-group" style="margin-bottom:12px;">
        <label class="form-label">전화번호</label>
        <input type="tel" class="form-input" id="phoneInput" placeholder="010-0000-0000"
          onkeydown="if(event.key==='Enter') doFind()"/>
      </div>
      <button class="btn btn-primary btn-full" onclick="doFind()">찾기</button>
    </div>

    <!-- 이름 폼 -->
    <div class="method-form" id="form-name">
      <div class="form-group" style="margin-bottom:12px;">
        <label class="form-label">이름 또는 닉네임</label>
        <input type="text" class="form-input" id="nameInput" placeholder="신청 시 입력한 이름"
          onkeydown="if(event.key==='Enter') doFind()"/>
      </div>
      <button class="btn btn-primary btn-full" onclick="doFind()">찾기</button>
    </div>

    <!-- 결과 -->
    <div class="result-card" id="resultCard">
      <h4 id="resultName"></h4>
      <p id="resultDesc"></p>
    </div>
    <div id="enterBtn" style="display:none;">
      <a id="enterLink" href="#" class="btn btn-accent btn-full btn-lg">내 코칭 대시보드 입장 →</a>
    </div>
    <div class="error-card" id="errorCard"></div>

    <!-- Sheets 검색 중 -->
    <div id="loadingMsg" style="display:none;text-align:center;font-size:14px;color:var(--text-muted);padding:12px;">
      🔍 검색 중...
    </div>

    <div class="divider-line">처음이신가요?</div>
    <a href="apply.html" class="btn btn-outline btn-full">코칭 신청하기</a>

    <p style="margin-top:16px;font-size:12px;color:var(--text-muted);text-align:center;line-height:1.7;">
      코치님이라면 → <a href="coach-home.html" style="color:var(--primary);">코치 대시보드</a><br/>
      관리자라면 → <a href="admin.html" style="color:var(--primary);">관리자 대시보드</a>
    </p>
  </div>
</div>

<script src="app.js"></script>
<script>
  let currentMethod = 'phone';

  // 저장된 세션 확인
  function checkSavedSession() {
    const savedId = localStorage.getItem('currentCoacheeId');
    if (!savedId) return;
    const coachee = DB.getItem('coachees', savedId);
    if (!coachee) return;

    const statusMap = {
      applied: '사전 설문 진행 중',
      survey_done: '코치 선택 단계',
      matched: '코치 매칭 대기 중',
      pledged: '목표 합의서 작성 전',
      coaching: '코칭 진행 중',
      completed: '코칭 완료'
    };

    document.getElementById('savedSession').style.display = 'block';
    document.getElementById('savedName').textContent = coachee.name + '님의 코칭';
    document.getElementById('savedStatus').textContent = statusMap[coachee.status] || coachee.status;
    document.getElementById('savedLink').href = `coachee-home.html?id=${savedId}`;
  }

  function switchMethod(m) {
    currentMethod = m;
    document.querySelectorAll('.method-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.method-form').forEach(f => f.classList.remove('active'));
    document.getElementById(`tab-${m}`).classList.add('active');
    document.getElementById(`form-${m}`).classList.add('active');
    hideResult();
  }

  function hideResult() {
    document.getElementById('resultCard').style.display = 'none';
    document.getElementById('enterBtn').style.display = 'none';
    document.getElementById('errorCard').style.display = 'none';
  }

  async function doFind() {
    hideResult();
    const query = currentMethod === 'phone'
      ? document.getElementById('phoneInput').value.trim().replace(/-/g, '')
      : document.getElementById('nameInput').value.trim();

    if (!query) {
      showError(currentMethod === 'phone' ? '전화번호를 입력해주세요.' : '이름을 입력해주세요.');
      return;
    }

    // 1. 로컬에서 먼저 찾기
    let found = searchLocal(query);

    // 2. Sheets에서 찾기 (로컬에 없을 때)
    if (!found && API.configured()) {
      document.getElementById('loadingMsg').style.display = 'block';
      try {
        const data = await API.fetchAll('coachees');
        if (data) {
          DB.set('coachees', data); // 로컬 갱신
          found = searchLocal(query);
        }
      } catch(e) {}
      document.getElementById('loadingMsg').style.display = 'none';
    }

    if (found) {
      showFound(found);
    } else {
      showError('해당 정보로 등록된 신청자를 찾을 수 없어요.<br/>다시 확인하거나 관리자에게 문의해주세요.');
    }
  }

  function searchLocal(query) {
    const coachees = DB.get('coachees');
    return coachees.find(c => {
      if (currentMethod === 'phone') {
        return (c.phone || '').replace(/-/g, '') === query;
      } else {
        return c.name === query;
      }
    }) || null;
  }

  function showFound(coachee) {
    const matching = DB.get('matchings').find(m => m.coacheeId === coachee.id);
    const coach = matching ? getCoach(matching.coachId) : null;

    document.getElementById('resultCard').style.display = 'block';
    document.getElementById('resultName').textContent = `${coachee.name}님을 찾았어요 ✓`;
    document.getElementById('resultDesc').textContent = coach
      ? `담당 코치: ${coach.name} · ${coachee.status}`
      : `상태: ${coachee.status}`;

    document.getElementById('enterBtn').style.display = 'block';
    document.getElementById('enterLink').href = `coachee-home.html?id=${coachee.id}`;

    // 세션 저장
    localStorage.setItem('currentCoacheeId', coachee.id);
  }

  function showError(msg) {
    const el = document.getElementById('errorCard');
    el.style.display = 'block';
    el.innerHTML = msg;
  }

  checkSavedSession();
</script>
</body>
</html>
